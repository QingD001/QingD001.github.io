<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs | Jinlin Zheng</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/tag.jpg?v=1" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="site-title">Jinlin Zheng</a>
      <nav class="site-nav">
        <a href="index.html">About</a>
        <a href="research.html">Research</a>
        <a href="blogs.html" class="active">Blogs</a>
        <a href="games/index.html">Games</a>
        <a href="projects.html">Projects</a>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☀️</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <h1 class="section-title">Blogs</h1>

    <!-- 博客列表由 JS 根据 blogPosts 渲染 -->
    <ul class="blog-list" id="blogList"></ul>
  </main>

  <footer class="site-footer">
    © 2026 Jinlin Zheng. My Blog。
  </footer>

  <script>
    // update blog ：在 blogs/posts下放入文件，在 blog & blog-view 里添加地址字段
    var blogPosts = [
      { title: 'Introduction to Decision Tree', date: '26-03-16', file: 'posts/Decision-Tree.html' },
      { title: "Introduction to Byte Latent Transformer" , date:'2026-03-18' ,file: "posts/Introduction-to-BLT.html" },
      { title: "Leetcode Weekly Contest 494" , date:'2026-03-22' ,file: "posts/Leetcode-SingleRound494.html" },
      { title: "[CSPro 23]收集卡牌·题解" , date:'2026-04-09' ,file: "posts/CSPro23T4.html" },
      { title: "近期 dp 题总结" , date:'2026-04-20' ,file: "posts/20260420近期dp题总结.html" },
      { title: "部分搜索与数学题心得" , date:'2026-04-21' ,file: "posts/20260421 部分搜索与数学题心得.html" },
      { title: "Educational Codeforces Round 189 (Div. 2)" , date:'2026-04-21' ,file: "posts/20260421Educational Codeforces Round 189 (Div. 2).html" },
      { title: "LLM成熟框架讲解" , date:'2026-05-08' ,file: "posts/LLM成熟框架讲解.html" },
      { title: "CF Round 1098 Div 2" , date:'2026-05-17' ,file: "posts/CF1098.html" },
      { title: "生成函数" , date:'2026-05-19' ,file: "posts/生成函数.html" },
      { title: "集合论" , date:'2026-05-19' ,file: "posts/集合论.html" }
    ];

    var listEl = document.getElementById('blogList');
    var base = 'blog-view.html?file=';
    blogPosts.forEach(function (post) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = base + encodeURIComponent(post.file);
      a.innerHTML = '<span class="blog-title">' + escapeHtml(post.title) + '</span><span class="blog-date">' + escapeHtml(post.date) + '</span>';
      li.appendChild(a);
      listEl.appendChild(li);
    });
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
