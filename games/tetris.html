<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>俄罗斯方块 | Games</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../favicon.png" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="../index.html" class="site-title">Jinlin Zheng</a>
      <nav class="site-nav">
        <a href="../index.html">About</a>
        <a href="../research.html">Research</a>
        <a href="../blogs.html">Blogs</a>
        <a href="index.html" class="active">Games</a>
        <a href="../projects.html">Projects</a>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☀️</button>
      </nav>
    </div>
  </header>

  <main class="main">
    <a class="back-link" href="index.html">← 返回 Games</a>

    <section class="game-panel">
      <div class="game-panel-head">
        <h1 class="game-panel-title">俄罗斯方块</h1>
        <div class="game-panel-actions">
          <div class="game-score" aria-label="俄罗斯方块 分数">Score: <span id="scoreTetris">0</span></div>
          <button class="btn" id="resetTetris" type="button">重开</button>
        </div>
      </div>
      <div class="game-tetris-layout">
        <div class="game-canvas-wrap">
          <canvas id="tetrisCanvas" width="300" height="480" aria-label="俄罗斯方块画布"></canvas>
        </div>
        <div class="game-side">
          <div class="side-card">
            <div class="side-title">操作</div>
            <div class="side-text">← →：左右移动</div>
            <div class="side-text">↑：旋转</div>
            <div class="side-text">↓：加速下落</div>
            <div class="side-text">Space：硬降</div>
          </div>
          <div class="side-card">
            <div class="side-title">规则</div>
            <div class="side-text">消行得分，越多行越高分。</div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    © 2026 Jinlin Zheng. My Blog。
  </footer>

  <script src="games.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
