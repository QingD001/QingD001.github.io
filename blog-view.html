<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>博客 | Jinlin Zheng</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="favicon.png" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="site-title">Jinlin Zheng</a>
      <nav class="site-nav">
        <a href="index.html">About</a>
        <a href="research.html">Research</a>
        <a href="blogs.html" class="active">Blogs</a>
        <a href="games/index.html">Games</a>
        <a href="projects.html">Projects</a>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">☀️</button>
      </nav>
    </div>
  </header>

  <div class="blog-article-wrap">
    <div class="blog-iframe-wrap">
      <iframe id="blogFrame" title="博客正文"></iframe>
    </div>

    <div class="blog-nav"></div>
  </div>

  <script>
    (function () {
      // 博客列表请在 blogs.html 中同步更新
      var blogPosts = [
        { title: 'Introduction to Decision Tree ', date: ' 2026-03-16', file: 'posts/Decision-Tree.html' },
        { title: "Introduction to Byte Latent Transformer" , date:'2026-03-18' ,file: "posts/Introduction-to-BLT.html" }
      ];

      var params = new URLSearchParams(location.search);
      var file = params.get('file');
      var frame = document.getElementById('blogFrame');

      var currentIndex = -1;
      if (file && /^posts\/[a-zA-Z0-9_.-]+\.html$/i.test(file)) {
        currentIndex = blogPosts.findIndex(function (p) { return p.file === file; });
        if (currentIndex !== -1) {
          frame.src = 'blogs/' + file;
          frame.onload = function () {
            try {
              var doc = frame.contentDocument || frame.contentWindow.document;
              var height = doc.documentElement.scrollHeight;
              frame.style.height = height + 'px';
            } catch (e) {
              // 如果跨域或无法访问，则保持默认高度
            }
          };
        } else {
          frame.srcdoc = '<p style="padding:24px;color:#6b7280;">未找到对应的博客（' + file + '）。</p>';
        }
      } else {
        frame.srcdoc = '<p style="padding:24px;color:#6b7280;">未指定有效的博客文件（?file=posts/xxx.html）。</p>';
      }

      var navWrap = document.querySelector('.blog-nav');

      function makeNavButton(label, targetFile) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-btn';
        btn.textContent = label;
        btn.addEventListener('click', function () {
          location.href = 'blog-view.html?file=' + encodeURIComponent(targetFile);
        });
        return btn;
      }

      if (navWrap) {
        if (currentIndex > 0) {
          navWrap.appendChild(makeNavButton('← 上一篇', blogPosts[currentIndex - 1].file));
        }
        if (currentIndex >= 0 && currentIndex < blogPosts.length - 1) {
          navWrap.appendChild(makeNavButton('下一篇 →', blogPosts[currentIndex + 1].file));
        }

        var listLink = document.createElement('a');
        listLink.href = 'blogs.html';
        listLink.className = 'nav-btn';
        listLink.setAttribute('role', 'button');
        listLink.textContent = '返回博客列表';
        navWrap.appendChild(listLink);
      }
    })();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
