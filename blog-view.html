<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>тЇџт«б | Jinlin Zheng</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="nav-inner">
      <a href="index.html" class="site-title">Jinlin Zheng</a>
      <nav class="site-nav">
        <a href="index.html">About</a>
        <a href="research.html">Research</a>
        <a href="blogs.html" class="active">Blogs</a>
        <a href="projects.html">Projects</a>
        <button class="theme-toggle" id="themeToggle" aria-label="тѕЄТЇбСИ╗жбў">Рўђ№ИЈ</button>
      </nav>
    </div>
  </header>

  <div class="blog-article-wrap">
    <div class="blog-iframe-wrap">
      <iframe id="blogFrame" title="тЇџт«бТГБТќЄ"></iframe>
    </div>

    <div class="blog-nav"></div>
  </div>

  <script>
    (function () {
      // тЇџт«бтѕЌУАеУ»итюе blogs.html СИГтљїТГЦТЏ┤Тќ░
      var blogPosts = [
        { title: 'Introduction to Decision Tree ', date: ' 2026-03-16', file: 'posts/Decision-Tree.html' }
      ];

      var params = new URLSearchParams(location.search);
      var file = params.get('file');
      var frame = document.getElementById('blogFrame');

      var currentIndex = -1;
      if (file && /^posts\/[a-zA-Z0-9_.-]+\.html$/i.test(file)) {
        currentIndex = blogPosts.findIndex(function (p) { return p.file === file; });
        if (currentIndex !== -1) {
          frame.src = 'blogs/' + file;
          frame.onload = function () {
            try {
              var doc = frame.contentDocument || frame.contentWindow.document;
              var height = doc.documentElement.scrollHeight;
              frame.style.height = height + 'px';
            } catch (e) {
              // тдѓТъюУиетЪЪТѕќТЌаТ│ЋУ«┐жЌ«№╝їтѕЎС┐ЮТїЂж╗ўУ«цжФўт║д
            }
          };
        } else {
          frame.srcdoc = '<p style="padding:24px;color:#6b7280;">ТюфТЅЙтѕ░т»╣т║ћуџётЇџт«б№╝ѕ' + file + '№╝Ѕсђѓ</p>';
        }
      } else {
        frame.srcdoc = '<p style="padding:24px;color:#6b7280;">ТюфТїЄт«џТюЅТЋѕуџётЇџт«бТќЄС╗Х№╝ѕ?file=posts/xxx.html№╝Ѕсђѓ</p>';
      }

      var navWrap = document.querySelector('.blog-nav');

      function makeNavButton(label, targetFile) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'nav-btn';
        btn.textContent = label;
        btn.addEventListener('click', function () {
          location.href = 'blog-view.html?file=' + encodeURIComponent(targetFile);
        });
        return btn;
      }

      if (navWrap) {
        if (currentIndex > 0) {
          navWrap.appendChild(makeNavButton('Рєљ СИіСИђу»Є', blogPosts[currentIndex - 1].file));
        }
        if (currentIndex >= 0 && currentIndex < blogPosts.length - 1) {
          navWrap.appendChild(makeNavButton('СИІСИђу»Є Рєњ', blogPosts[currentIndex + 1].file));
        }

        var listLink = document.createElement('a');
        listLink.href = 'blogs.html';
        listLink.className = 'nav-btn';
        listLink.setAttribute('role', 'button');
        listLink.textContent = 'У┐ћтЏътЇџт«бтѕЌУАе';
        navWrap.appendChild(listLink);
      }
    })();
  </script>
  <script src="js/main.js"></script>
</body>
</html>
