<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>示例博客</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 720px; margin: 0 auto; padding: 24px; color: #1a1a1a; }
    h1 { color: #1a1a1a; border-bottom: 2px solid #add8e6; padding-bottom: 8px; }
    .date { color: #6b7280; font-size: 0.9rem; margin-bottom: 24px; }
    p { color: #4b5563; }
    a { color: #66b2ff; }
  </style>
</head>
<body>
  <h1>欢迎来到博客</h1>
  <p class="date">2026-03-16</p>
  <p>这是一篇示例博客。你可以把任意 HTML 文件放到 <code>blogs/posts/</code> 目录下，然后在 <code>blogs.html</code> 里的 <code>blogPosts</code> 数组中添加一条记录（标题、日期、文件名），即可在博客列表中显示并点击用 iframe 打开。</p>
  <p>支持在 HTML 中写样式、脚本、图片等，完全由你控制内容与版式。</p>
</body>
</html>
